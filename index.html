<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>P+R Mermoz-Pinel</title>
  <meta name="description" content="Disponibilité en temps réel du Parc Relais TCL Mermoz-Pinel" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Parc Relais TCL Mermoz" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
    :root{--bg:#0a0f1e;--surface:#111827;--border:#1e293b;--accent:#38bdf8;--accent2:#818cf8;--green:#4ade80;--orange:#fb923c;--red:#f87171;--gray:#475569;--text:#f1f5f9;--muted:#64748b}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;overflow:hidden;position:relative}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none}
    body::after{content:'';position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,248,.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
    .card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 28px;position:relative;z-index:1;animation:fadeUp .5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:var(--accent);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:20px}
    .badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .station-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:4px}
    .station-sub{color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px}
    .dispo-wrap{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
    .dispo-number{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;line-height:1;letter-spacing:-.04em;transition:color .5s}
    .dispo-label{color:var(--muted);font-size:12px;line-height:1.4}
    .progress-wrap{margin:20px 0}
    .progress-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
    .progress-track{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.16,1,.3,1),background .5s}
    .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;border:1px solid currentColor;margin-bottom:28px;transition:color .5s,border-color .5s}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .info-cell{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px}
    .info-cell-label{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
    .info-cell-value{font-size:14px;font-weight:500;color:var(--text)}
    .horaires-cell{grid-column:1/-1;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px}
    .horaires-text{font-size:11px;color:var(--muted);line-height:1.6}
    /* Bouton navigation */
    .nav-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:14px 20px;border-radius:14px;cursor:pointer;letter-spacing:.06em;transition:background .2s,transform .1s;margin-bottom:20px;text-decoration:none}
    .nav-btn:hover{background:rgba(56,189,248,.2)}
    .nav-btn:active{transform:scale(.98)}
    .footer{display:flex;align-items:center;justify-content:space-between}
    .update-time{font-size:10px;color:var(--muted)}
    .refresh-btn{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;border-radius:100px;cursor:pointer;letter-spacing:.05em;transition:background .2s,transform .1s;display:flex;align-items:center;gap:6px}
    .refresh-btn:active{transform:scale(.96)}
    .refresh-btn:hover{background:rgba(56,189,248,.15)}
    .refresh-btn.spinning svg{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{color:var(--red);font-size:12px;text-align:center;padding:12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px;margin-bottom:20px}
    .c-green{color:#4ade80}.c-orange{color:#fb923c}.c-red{color:#f87171}.c-gray{color:#475569}
    .b-green{background:#4ade80}.b-orange{background:#fb923c}.b-red{background:#f87171}.b-gray{background:#475569}
  </style>
</head>
<body>
<div class="card">
  <div class="badge">Temps réel · TCL</div>
  <div class="station-name">Mermoz<br>Pinel</div>
  <div class="station-sub">Parc Relais · Métro D · Bron</div>
  <div id="error-zone"></div>
  <div class="dispo-wrap">
    <div class="dispo-number c-green" id="dispo-num">—</div>
    <div class="dispo-label">places<br>libres</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-meta"><span>OCCUPATION</span><span id="pct-label">—</span></div>
    <div class="progress-track"><div class="progress-fill b-green" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="status-pill c-green" id="status-pill">Chargement…</div>
  <div class="info-grid">
    <div class="info-cell"><div class="info-cell-label">Capacité totale</div><div class="info-cell-value" id="cap-total">—</div></div>
    <div class="info-cell"><div class="info-cell-label">Places PMR</div><div class="info-cell-value" id="cap-pmr">—</div></div>
    <div class="horaires-cell"><div class="info-cell-label">Horaires</div><div class="horaires-text" id="horaires">Chargement…</div></div>
  </div>

  <!-- BOUTON NAVIGATION -->
  <a class="nav-btn"
     href="https://www.google.com/maps/dir/?api=1&destination=45.7371,4.8963&travelmode=driving"
     target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 11 22 2 13 21 11 13 3 11"/>
    </svg>
    Se diriger vers le parking
  </a>

  <div class="footer">
    <div class="update-time" id="update-time">—</div>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchData()">
      <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      Actualiser
    </button>
  </div>
</div>

<script>
const API="https://mermoz-proxy.jean-luc-perrotto.workers.dev";

function getStatus(dispo,capacite){
  if(dispo===null||dispo===-1||dispo===undefined)return{label:"Non disponible",cls:"gray",pct:0};
  if(dispo===0)return{label:"Complet",cls:"red",pct:0};
  const pct=dispo/capacite;
  if(pct<=.2)return{label:"Presque plein",cls:"red",pct:Math.round(pct*100)};
  if(pct<=.5)return{label:"Limité",cls:"orange",pct:Math.round(pct*100)};
  return{label:"Disponible",cls:"green",pct:Math.round(pct*100)};
}

function setColor(cls){
  document.getElementById('dispo-num').className=`dispo-number c-${cls}`;
  document.getElementById('progress-fill').className=`progress-fill b-${cls}`;
  document.getElementById('status-pill').className=`status-pill c-${cls}`;
}

async function fetchData(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.classList.add('spinning');
  document.getElementById('error-zone').innerHTML='';
  try{
    const res=await fetch(API);
    if(!res.ok)throw new Error(`Erreur HTTP ${res.status}`);
    const p=await res.json();
    if(!p||p.error)throw new Error(p?.error||"Données indisponibles");
    const s=getStatus(p.nb_tot_place_dispo,p.capacite);
    document.getElementById('dispo-num').textContent=(p.nb_tot_place_dispo===null||p.nb_tot_place_dispo===-1)?"—":p.nb_tot_place_dispo;
    document.getElementById('cap-total').textContent=p.capacite+' places';
    document.getElementById('cap-pmr').textContent=p.place_handi+' places';
    document.getElementById('horaires').textContent=p.horaires||'—';
    document.getElementById('pct-label').textContent=s.pct?`${100-s.pct}% occupé`:'—';
    document.getElementById('progress-fill').style.width=s.pct+'%';
    document.getElementById('status-pill').textContent=s.label;
    document.getElementById('update-time').textContent='màj '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    setColor(s.cls);
  }catch(e){
    document.getElementById('error-zone').innerHTML=`<div class="error-msg">⚠️ ${e.message}</div>`;
    document.getElementById('dispo-num').textContent='—';
    document.getElementById('update-time').textContent='Échec de mise à jour';
    setColor('gray');
  }finally{
    btn.disabled=false;btn.classList.remove('spinning');
  }
}

fetchData();
setInterval(fetchData,120000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
